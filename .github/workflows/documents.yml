name: Documents

on:
  push:
    paths:
      - '**.md'
      - 'scripts/**'
      - '.cursor/**'
      - 'acronyms.json'
      - 'Makefile'
      - '.github/workflows/documents.yml'
  pull_request:
    paths:
      - '**.md'
      - 'scripts/**'
      - '.cursor/**'
      - 'acronyms.json'
      - 'Makefile'
      - '.github/workflows/documents.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate links, anchors, and README TOC
        run: |
          python3 scripts/validate-doc-links.py
          python3 scripts/validate-doc-readme.py
          python3 scripts/validate-doc-prose.py
      - name: Verify acronym expansions up to date
        run: python3 scripts/expand-acronyms.py --check
