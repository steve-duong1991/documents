name: Documents external link check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  validate-external:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate external https links
        run: make validate-external
